spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/flashsale
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

server:
  port: 8080

flashsale:
  stock-cache-ttl-seconds: 300
  idempotency-ttl-seconds: 86400